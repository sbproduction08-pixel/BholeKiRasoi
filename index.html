<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>NGO Website - ₹10 Meal</title>
    <style>
        /* Base Reset & Styling */
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
        }
        body {
            background-color: #f8f9fa;
            color: #333;
            line-height: 1.6;
        }
        /* Sticky Header / Tabs Menu */
        header {
            background: #fff;
            position: sticky;
            top: 0;
            z-index: 100;
            box-shadow: 0 4px 6px rgba(0,0,0,0.05);
            display: flex;
            justify-content: space-between;
            align-items: center;
            padding: 15px 5%;
        }
        .logo {
            font-size: 20px;
            font-weight: bold;
            color: #e67e22;
        }
        nav a {
            text-decoration: none;
            color: #333;
            margin-left: 20px;
            font-weight: 500;
            transition: color 0.3s;
        }
        nav a:hover {
            color: #e67e22;
        }
        /* Sections Common Style */
        section {
            padding: 60px 5%;
        }
        /* Hero Section Layout */
        .hero {
            background: linear-gradient(rgba(0,0,0,0.7), rgba(0,0,0,0.7)), url('placeholder-banner.jpg') no-repeat center center/cover;
            height: 70vh;
            display: flex;
            flex-direction: column;
            justify-content: center;
            align-items: center;
            text-align: center;
            color: #fff;
        }
        .hero h1 {
            font-size: 40px;
            margin-bottom: 15px;
            color: #fff;
        }
        /* Counters/Impact Grid Layout */
        .impact-container {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(250px, 1fr));
            gap: 20px;
            margin-top: 30px;
        }
        .impact-card {
            background: #fff;
            padding: 30px;
            border-radius: 8px;
            text-align: center;
            box-shadow: 0 4px 10px rgba(0,0,0,0.05);
            border-top: 4px solid #e67e22;
        }
        .impact-card h2 {
            font-size: 35px;
            color: #e67e22;
            margin-bottom: 10px;
        }
        /* Donation/QR Card Layout */
        .donate-box {
            background: #fdf2e9;
            border: 1px solid #f5cba7;
            border-radius: 8px;
            padding: 40px;
            display: flex;
            flex-wrap: wrap;
            justify-content: space-between;
            align-items: center;
            gap: 20px;
        }
        .donate-details {
            flex: 1;
            min-width: 300px;
        }
        .qr-placeholder {
            width: 150px;
            height: 150px;
            background: #333;
            color: #fff;
            display: flex;
            justify-content: center;
            align-items: center;
            font-weight: bold;
            border-radius: 4px;
        }
    </style>
</head>
<body>

    <!-- 1. Header & Navigation Tabs Menu -->
    <header>
        <div class="logo" id="layout-logo">NGO Name Loading...</div>
        <nav>
            <a href="#home">Home</a>
            <a href="#impact">Our Impact</a>
            <a href="#donate">Donate</a>
        </nav>
    </header>

    <!-- 2. Hero Section Layout -->
    <section id="home" class="hero">
        <h1 id="layout-tagline">Loading Tagline...</h1>
        <p id="layout-subtagline">Please wait...</p>
    </section>

    <!-- 3. Impact Section Layout -->
    <section id="impact">
        <h2 style="text-align: center; margin-bottom: 10px;">Our Impact (Humara Kaam)</h2>
        <div class="impact-container">
            <div class="impact-card">
                <h2 id="cnt-meals">0+</h2>
                <p>Total Meals Served</p>
            </div>
            <div class="impact-card">
                <h2 id="cnt-daily">0+</h2>
                <p>Daily People Fed</p>
            </div>
            <div class="impact-card">
                <h2 id="cnt-transparency">100%</h2>
                <p>Transparency Status</p>
            </div>
        </div>
    </section>

    <!-- 4. Donation Box Layout -->
    <section id="donate">
        <div class="donate-box">
            <div class="donate-details">
                <h2 style="color: #d35400; margin-bottom: 15px;">Help Us Feed More People</h2>
                <p id="layout-bank-name">Bank Name: Loading...</p>
                <p id="layout-bank-acc">Account No: Loading...</p>
                <p id="layout-bank-ifsc">IFSC Code: Loading...</p>
            </div>
            <div class="qr-placeholder" id="layout-qr">[ QR CODE ]</div>
        </div>
    </section>

    <!-- 5. Connecting the Data Layer File -->
    <script src="data.js"></script>
</body>
</html>
